name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set version env
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "TAG=${TAG}" >> "$GITHUB_ENV"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Build release asset
        run: |
          set -euo pipefail

          sed -i -E "s/^__version__ = \".*\"/__version__ = \"${VERSION}\"/" _version.py

          mkdir -p dist/km/assets
          cp main.py _version.py install.sh km dist/km/
          cp assets/keyd.config dist/km/assets/
          chmod 755 dist/km/km

          tar -C dist -czf km-linux-x64.tar.gz km

          ls -lah
          test -f km-linux-x64.tar.gz

      - name: Create release and upload asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${TAG}" "${GITHUB_WORKSPACE}/km-linux-x64.tar.gz" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG}" \
            --generate-notes
